      <title>Katarot</title>

        <style>
            @font-face {
                  font-family: 'Freakshow';
                        src: url('freakshow.ttf');
                            }

                                body {
                                      margin: 0;
                                            font-family: 'Freakshow', sans-serif;
                                                  background: linear-gradient(270deg, #2e004f, #4b0082, #1a001f);
                                                        background-size: 600% 600%;
                                                              animation: gradientBG 10s ease infinite;
                                                                    color: white;
                                                                          text-align: center;
                                                                              }

                                                                                  @keyframes gradientBG {
                                                                                        0% { background-position: 0% 50%; }
                                                                                              50% { background-position: 100% 50%; }
                                                                                                    100% { background-position: 0% 50%; }
                                                                                                        }

                                                                                                            h1 {
                                                                                                                  margin-top: 40px;
                                                                                                                        font-size: 48px;
                                                                                                                            }

                                                                                                                                .cartas {
                                                                                                                                      display: flex;
                                                                                                                                            justify-content: center;
                                                                                                                                                  flex-wrap: wrap;
                                                                                                                                                        gap: 20px;
                                                                                                                                                              margin-top: 40px;
                                                                                                                                                                  }

                                                                                                                                                                      .carta {
                                                                                                                                                                            width: 150px;
                                                                                                                                                                                  height: 250px;
                                                                                                                                                                                        perspective: 1000px;
                                                                                                                                                                                              cursor: pointer;
                                                                                                                                                                                                  }

                                                                                                                                                                                                      .carta-inner {
                                                                                                                                                                                                            width: 100%;
                                                                                                                                                                                                                  height: 100%;
                                                                                                                                                                                                                        position: relative;
                                                                                                                                                                                                                              transform-style: preserve-3d;
                                                                                                                                                                                                                                    transition: transform 0.8s;
                                                                                                                                                                                                                                        }

                                                                                                                                                                                                                                            .carta.virada .carta-inner {
                                                                                                                                                                                                                                                  transform: rotateY(180deg);
                                                                                                                                                                                                                                                      }

                                                                                                                                                                                                                                                          .carta-front, .carta-back {
                                                                                                                                                                                                                                                                position: absolute;
                                                                                                                                                                                                                                                                      width: 100%;
                                                                                                                                                                                                                                                                            height: 100%;
                                                                                                                                                                                                                                                                                  backface-visibility: hidden;
                                                                                                                                                                                                                                                                                        border-radius: 10px;
                                                                                                                                                                                                                                                                                            }

                                                                                                                                                                                                                                                                                                .carta-front {
                                                                                                                                                                                                                                                                                                      background-image: url('IMAGEM_VERSO.png');
                                                                                                                                                                                                                                                                                                            background-size: cover;
                                                                                                                                                                                                                                                                                                                }

                                                                                                                                                                                                                                                                                                                    .carta-back {
                                                                                                                                                                                                                                                                                                                          transform: rotateY(180deg);
                                                                                                                                                                                                                                                                                                                                background-size: cover;
                                                                                                                                                                                                                                                                                                                                    }
                                                                                                                                                                                                                                                                                                                                      </style>
                                                                                                                                                                                                                                                                                                                                      </head>
