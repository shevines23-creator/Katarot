<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
    <title>Katarot</title>

      <style>
          @font-face {
                font-family: 'Freakshow';
                      src: url('freakshow.ttf');
                          }

                              body {
                                    margin: 0;
                                          font-family: 'Freakshow', sans-serif;
                                                background: linear-gradient(270deg, #1a001f, #3a0066, #0d001a);
                                                      background-size: 600% 600%;
                                                            animation: fundo 10s infinite;
                                                                  color: white;
                                                                        text-align: center;
                                                                            }

                                                                                @keyframes fundo {
                                                                                      0% { background-position: 0% 50%; }
                                                                                            50% { background-position: 100% 50%; }
                                                                                                  100% { background-position: 0% 50%; }
                                                                                                      }

                                                                                                          h1 {
                                                                                                                margin-top: 30px;
                                                                                                                      font-size: 50px;
                                                                                                                          }

                                                                                                                              button {
                                                                                                                                    padding: 12px 25px;
                                                                                                                                          border: none;
                                                                                                                                                border-radius: 10px;
                                                                                                                                                      background: purple;
                                                                                                                                                            color: white;
                                                                                                                                                                  font-size: 16px;
                                                                                                                                                                        cursor: pointer;
                                                                                                                                                                              margin-top: 20px;
                                                                                                                                                                                  }

                                                                                                                                                                                      .cartas {
                                                                                                                                                                                            display: flex;
                                                                                                                                                                                                  justify-content: center;
                                                                                                                                                                                                        gap: 20px;
                                                                                                                                                                                                              margin-top: 40px;
                                                                                                                                                                                                                    flex-wrap: wrap;
                                                                                                                                                                                                                        }

                                                                                                                                                                                                                            .carta {
                                                                                                                                                                                                                                  width: 150px;
                                                                                                                                                                                                                                        height: 230px;
                                                                                                                                                                                                                                              perspective: 1000px;
                                                                                                                                                                                                                                                    cursor: pointer;
                                                                                                                                                                                                                                                        }

                                                                                                                                                                                                                                                            .inner {
                                                                                                                                                                                                                                                                  width: 100%;
                                                                                                                                                                                                                                                                        height: 100%;
                                                                                                                                                                                                                                                                              transition: transform 0.8s;
                                                                                                                                                                                                                                                                                    transform-style: preserve-3d;
                                                                                                                                                                                                                                                                                          position: relative;
                                                                                                                                                                                                                                                                                              }

                                                                                                                                                                                                                                                                                                  .carta.virada .inner {
                                                                                                                                                                                                                                                                                                        transform: rotateY(180deg);
                                                                                                                                                                                                                                                                                                            }

                                                                                                                                                                                                                                                                                                                .frente, .verso {
                                                                                                                                                                                                                                                                                                                      position: absolute;
                                                                                                                                                                                                                                                                                                                            width: 100%;
                                                                                                                                                                                                                                                                                                                                  height: 100%;
                                                                                                                                                                                                                                                                                                                                        backface-visibility: hidden;
                                                                                                                                                                                                                                                                                                                                              border-radius: 10px;
                                                                                                                                                                                                                                                                                                                                                    background-size: cover;
                                                                                                                                                                                                                                                                                                                                                          background-position: center;
                                                                                                                                                                                                                                                                                                                                                              }

                                                                                                                                                                                                                                                                                                                                                                  .frente {
                                                                                                                                                                                                                                                                                                                                                                        background-image: url('IMAGEM_VERSO.png');
                                                                                                                                                                                                                                                                                                                                                                            }

                                                                                                                                                                                                                                                                                                                                                                                .verso {
                                                                                                                                                                                                                                                                                                                                                                                      transform: rotateY(180deg);
                                                                                                                                                                                                                                                                                                                                                                                          }

                                                                                                                                                                                                                                                                                                                                                                                              .ia {
                                                                                                                                                                                                                                                                                                                                                                                                    margin-top: 30px;
                                                                                                                                                                                                                                                                                                                                                                                                          padding: 20px;
                                                                                                                                                                                                                                                                                                                                                                                                                max-width: 400px;
                                                                                                                                                                                                                                                                                                                                                                                                                      margin-left: auto;
                                                                                                                                                                                                                                                                                                                                                                                                                            margin-right: auto;
                                                                                                                                                                                                                                                                                                                                                                                                                                }
                                                                                                                                                                                                                                                                                                                                                                                                                                  </style>
                                                                                                                                                                                                                                                                                                                                                                                                                                  </head>

                                                                                                                                                                                                                                                                                                                                                                                                                                  <body>

                                                                                                                                                                                                                                                                                                                                                                                                                                  <h1>KATAROT</h1>

                                                                                                                                                                                                                                                                                                                                                                                                                                  <button id="btn">Revelar Destino</button>

                                                                                                                                                                                                                                                                                                                                                                                                                                  <div class="cartas" id="cartas"></div>

                                                                                                                                                                                                                                                                                                                                                                                                                                  <div class="ia" id="ia"></div>

                                                                                                                                                                                                                                                                                                                                                                                                                                  <script>
                                                                                                                                                                                                                                                                                                                                                                                                                                  const lista = [
                                                                                                                                                                                                                                                                                                                                                                                                                                    "IMAGEM_Estrela.png",
                                                                                                                                                                                                                                                                                                                                                                                                                                      "IMAGEM_Mago.png",
                                                                                                                                                                                                                                                                                                                                                                                                                                        "IMAGEM_Torre.png",
                                                                                                                                                                                                                                                                                                                                                                                                                                          "IMAGEM_Lua.png",
                                                                                                                                                                                                                                                                                                                                                                                                                                            "IMAGEM_Sol.png"
                                                                                                                                                                                                                                                                                                                                                                                                                                            ];

                                                                                                                                                                                                                                                                                                                                                                                                                                            function gerar() {
                                                                                                                                                                                                                                                                                                                                                                                                                                              const container = document.getElementById("cartas");
                                                                                                                                                                                                                                                                                                                                                                                                                                                const ia = document.getElementById("ia");

                                                                                                                                                                                                                                                                                                                                                                                                                                                  container.innerHTML = "";
                                                                                                                                                                                                                                                                                                                                                                                                                                                    let leitura = [];

                                                                                                                                                                                                                                                                                                                                                                                                                                                      for (let i = 0; i < 3; i++) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                          const img = lista[Math.floor(Math.random() * lista.length)];
                                                                                                                                                                                                                                                                                                                                                                                                                                                              leitura.push(img);

                                                                                                                                                                                                                                                                                                                                                                                                                                                                  const carta = document.createElement("div");
                                                                                                                                                                                                                                                                                                                                                                                                                                                                      carta.className = "carta";

                                                                                                                                                                                                                                                                                                                                                                                                                                                                          carta.innerHTML = `
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <div class="inner">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <div class="frente"></div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <div class="verso" style="background-image: url('${img}')"></div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          `;

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              carta.addEventListener("click", () => {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    carta.classList.toggle("virada");
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        });

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            container.appendChild(carta);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                ia.innerText = interpretar(leitura);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                function interpretar(cartas) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  let texto = "";

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    if (cartas.some(c => c.includes("Sol"))) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        texto += "Sucesso e energia positiva. ";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            if (cartas.some(c => c.includes("Lua"))) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                texto += "Dúvidas e emoções confusas. ";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    if (cartas.some(c => c.includes("Torre"))) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        texto += "Mudanças fortes chegando. ";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            if (cartas.some(c => c.includes("Mago"))) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                texto += "Você tem poder de transformação. ";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    if (cartas.some(c => c.includes("Estrela"))) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        texto += "Esperança e proteção. ";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            return texto || "O destino ainda está oculto.";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            // GARANTE QUE O BOTÃO FUNCIONE
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            document.getElementById("btn").addEventListener("click", gerar);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            </script>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            </body>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            </html>
